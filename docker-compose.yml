services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Containers reach Redis by service name, not localhost
      - REDIS_HOST=redis
    volumes:
      # Mount source for --reload to pick up code changes without rebuilding
      - ./app:/app/app
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: python -m app.worker.main
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
    restart: unless-stopped
